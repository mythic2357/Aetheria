<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether: Modular Core Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="relative bg-[#090d16] overflow-hidden select-none w-screen h-screen m-0">

    <canvas id="gameCanvas" class="block w-full h-full"></canvas>

    <div class="absolute inset-0 pointer-events-none p-6 flex flex-col justify-between">
        
        <div class="flex justify-between items-start">
            
            <div class="bg-amber-50/95 backdrop-blur-md px-5 py-3 rounded-2xl shadow-xl border-2 border-amber-200 flex items-center gap-3">
                <span class="inline-block w-4 h-4 bg-slate-500 rounded-sm shadow-md"></span>
                <div>
                    <span class="text-[10px] font-bold text-amber-800 uppercase tracking-wider block">Material Pouch</span>
                    <div class="text-lg font-black text-slate-800 leading-none mt-0.5">
                        <span id="ui-stone-count">0</span> <span class="text-xs font-semibold text-slate-500">Stone Shards</span>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-2 items-end">
                <div class="bg-white/95 backdrop-blur-md px-4 py-2 rounded-xl shadow-md border border-slate-100 text-right">
                    <span class="text-[10px] font-bold text-indigo-600 uppercase tracking-wider block">Cartography</span>
                    <div class="text-sm font-black text-slate-800 mt-0.5">
                        Revealed: <span id="ui-discovered">0</span>%
                    </div>
                </div>
                <div class="bg-slate-900/80 backdrop-blur-md px-3 py-1.5 rounded-lg border border-slate-700 text-[10px] font-mono text-slate-400 flex flex-col items-end gap-0.5">
                    <div>Seed: <span id="ui-seed" class="text-amber-400 font-bold">---</span></div>
                    <div>World Time: <span id="ui-clock" class="text-emerald-400">Day 1, 00:00</span></div>
                </div>
            </div>
        </div>

        <div class="flex justify-center mb-2">
            <div class="bg-slate-900/90 backdrop-blur-md px-6 py-3 rounded-full shadow-2xl border border-slate-700 text-xs font-medium tracking-wide text-slate-200">
                Move with <span class="bg-slate-700 px-2 py-0.5 rounded text-white font-bold mx-0.5 border-b-2 border-slate-950">W</span><span class="bg-slate-700 px-2 py-0.5 rounded text-white font-bold mx-0.5 border-b-2 border-slate-950">A</span><span class="bg-slate-700 px-2 py-0.5 rounded text-white font-bold mx-0.5 border-b-2 border-slate-950">S</span><span class="bg-slate-700 px-2 py-0.5 rounded text-white font-bold mx-0.5 border-b-2 border-slate-950">D</span> • Strike Mountains with <span class="text-amber-400 font-bold">Left-Click</span>
            </div>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>

</body>
</html>
