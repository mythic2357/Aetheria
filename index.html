<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Living Ark: Phase 1 Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #090d16; }
        canvas { display: block; }
    </style>
</head>
<body class="relative select-none text-slate-700 font-sans">

    <canvas id="gameCanvas"></canvas>

    <div class="absolute inset-0 pointer-events-none p-6 flex flex-col justify-between">
        <div class="flex justify-between items-start">
            <div class="bg-white/95 backdrop-blur-md px-5 py-3 rounded-2xl shadow-xl border border-emerald-100">
                <span class="text-xs font-bold text-emerald-600 uppercase tracking-wider block">Ark Cartography</span>
                <div class="text-sm font-black text-slate-800 mt-1">
                    Discovered Land: <span id="ui-discovered" class="text-indigo-600">0</span>%
                </div>
            </div>
            <div class="bg-white/95 backdrop-blur-md px-4 py-2 rounded-xl shadow-md text-xs font-semibold text-slate-500">
                Grid System: <span class="text-slate-800 font-bold">32x32px Tiles</span> | Char: <span class="text-slate-800 font-bold">32x48px</span>
            </div>
        </div>

        <div class="flex justify-center mb-2">
            <div class="bg-slate-900/90 backdrop-blur-sm px-6 py-2.5 rounded-full shadow-lg border border-slate-700 text-xs tracking-wide text-slate-200">
                Use <span class="bg-slate-700 px-1.5 py-0.5 rounded text-white font-bold mx-0.5">W</span><span class="bg-slate-700 px-1.5 py-0.5 rounded text-white font-bold mx-0.5">A</span><span class="bg-slate-700 px-1.5 py-0.5 rounded text-white font-bold mx-0.5">S</span><span class="bg-slate-700 px-1.5 py-0.5 rounded text-white font-bold mx-0.5">D</span> to Move Character and Clear the Fog
            </div>
        </div>
    </div>

    <script>
        // --- 1. SETTING UP RESIZABLE VIEWPORT ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- 2. LAYING DOWN DESIGN CONSTANTS ---
        const TILE_SIZE = 32;
        const CHAR_WIDTH = 32;
        const CHAR_HEIGHT = 48; // 1.5 Tiles tall!

        // Map Size (in terms of grid cells)
        const MAP_COLS = 60;
        const MAP_ROWS = 40;

        const PALETTE = {
            'deep_water': '#1d4ed8', // Dark Blue
            'plush_grass': '#22c55e', // Vibrant Grass Green
            'stone_wall': '#64748b',  // Rocky Mountain Gray
            'fog_hidden': '#0f172a',  // Dark, mysterious Midnight Blue fog
            'player_color': '#f43f5e' // Bright rose silhouette placeholder
        };

        // --- 3. DATA ENGINE MEMORY STRUCTURES ---
        let worldGrid = {};
        let fogGrid = {}; // true = hidden under fog, false = cleared/discovered

        // Character object position details (centered initially)
        let player = {
            x: (MAP_COLS * TILE_SIZE) / 2,
            y: (MAP_ROWS * TILE_SIZE) / 2,
            speed: 4
        };

        const input = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false };

        // --- 4. ENGINE GENERATION MATRIX ---
        function generateStructuredContinent() {
            for (let x = 0; x < MAP_COLS; x++) {
                for (let y = 0; y < MAP_ROWS; y++) {
                    let tileKey = `x${x}_y${y}`;
                    let type = 'plush_grass';

                    // Create a natural water boundary along the map perimeter edges
                    if (x < 3 || x > MAP_COLS - 4 || y < 3 || y > MAP_ROWS - 4) {
                        type = 'deep_water';
                    } else {
                        // Generate random craggy mountain formations across the interior layout
                        let clusterNoise = Math.sin(x * 0.3) * Math.cos(y * 0.3);
                        if (clusterNoise > 0.45) {
                            type = 'stone_wall';
                        }
                    }

                    worldGrid[tileKey] = type;
                    fogGrid[tileKey] = true; // Entire map starts hidden in heavy fog
                }
            }
        }

        // --- 5. LOGIC PROCESSING RUNTIME ---
        window.addEventListener('keydown', (e) => { if (input.hasOwnProperty(e.key)) input[e.key] = true; });
        window.addEventListener('keyup', (e) => { if (input.hasOwnProperty(e.key)) input[e.key] = false; });

        function processPlayerMechanics() {
            // Apply movement directions
            if (input.w || input.ArrowUp) player.y -= player.speed;
            if (input.s || input.ArrowDown) player.y += player.speed;
            if (input.a || input.ArrowLeft) player.x -= player.speed;
            if (input.d || input.ArrowRight) player.x += player.speed;

            // Simple map border clamps to prevent character escaping boundary bounds
            player.x = Math.max(0, Math.min(player.x, (MAP_COLS * TILE_SIZE) - CHAR_WIDTH));
            player.y = Math.max(0, Math.min(player.y, (MAP_ROWS * TILE_SIZE) - CHAR_HEIGHT));

            // CALCULATE FOG CLEARANCE: Find what tile the character's feet are sitting on
            let playerGridX = Math.floor((player.x + CHAR_WIDTH / 2) / TILE_SIZE);
            let playerGridY = Math.floor((player.y + CHAR_HEIGHT - 4) / TILE_SIZE);

            // Burn away fog in a small circular sight radius around our character position coordinates
            let sightRadius = 3;
            for (let rx = -sightRadius; rx <= sightRadius; rx++) {
                for (let ry = -sightRadius; ry <= sightRadius; ry++) {
                    let targetX = playerGridX + rx;
                    let targetY = playerGridY + ry;
                    
                    // Simple distance formula logic to keep visibility circle profile round
                    if (Math.sqrt(rx*rx + ry*ry) <= sightRadius) {
                        fogGrid[`x${targetX}_y${targetY}`] = false; 
                    }
                }
            }

            calculateDiscoveryMetrics();
        }

        function calculateDiscoveryMetrics() {
            let totalTiles = MAP_COLS * MAP_ROWS;
            let clearedCount = 0;
            for (let key in fogGrid) {
                if (fogGrid[key] === false) clearedCount++;
            }
            let percentage = Math.floor((clearedCount / totalTiles) * 100);
            document.getElementById('ui-discovered').innerText = percentage;
        }

        // --- 6. RENDER MATRIX DRAW LOOP ---
        function renderScene() {
            // Clear the viewport display area
            ctx.fillStyle = '#090d16';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Loop through map space definitions
            for (let x = 0; x < MAP_COLS; x++) {
                for (let y = 0; y < MAP_ROWS; y++) {
                    let tileKey = `x${x}_y${y}`;
                    let renderX = x * TILE_SIZE;
                    let renderY = y * TILE_SIZE;

                    if (fogGrid[tileKey] === true) {
                        // Render thick fog blocks
                        ctx.fillStyle = PALETTE['fog_hidden'];
                        ctx.fillRect(renderX, renderY, TILE_SIZE, TILE_SIZE);
                    } else {
                        // Draw revealed ground tiles
                        ctx.fillStyle = PALETTE[worldGrid[tileKey]];
                        ctx.fillRect(renderX, renderY, TILE_SIZE, TILE_SIZE);

                        // Subtle framing boundary line for grid layout separation alignment
                        ctx.strokeStyle = 'rgba(255,255,255,0.04)';
                        ctx.strokeRect(renderX, renderY, TILE_SIZE, TILE_SIZE);
                    }
                }
            }

            // Draw the Player Character (1.5 tiles tall placeholder asset box)
            ctx.fillStyle = PALETTE['player_color'];
            ctx.fillRect(player.x, player.y, CHAR_WIDTH, CHAR_HEIGHT);

            // Draw simple black structural tool overlay on player placeholder box
            ctx.fillStyle = '#000000';
            ctx.fillRect(player.x + 12, player.y + 10, 8, 20); // Tool Handle
            ctx.fillRect(player.x + 4, player.y + 6, 24, 6);   // Tool Mallet Head
        }

        function mainLoop() {
            processPlayerMechanics();
            renderScene();
            requestAnimationFrame(mainLoop);
        }

        // --- 7. INITIALIZATION RUN ---
        generateStructuredContinent();
        requestAnimationFrame(mainLoop);

    </script>
</body>
</html>
